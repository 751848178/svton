<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svton Agent Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,system-ui,sans-serif;padding:16px;min-height:100vh}

.config-bar{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px;margin-bottom:12px}
.config-bar label{font-size:10px;color:#666;display:block;margin-bottom:3px}
.config-bar input{width:100%;padding:6px 8px;background:#0d0d0d;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:11px;outline:none}
.config-bar input:focus{border-color:#3B82F6}
.config-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end}
.config-row>div{min-width:0}
.btn-connect{padding:6px 16px;background:#3B82F6;border:none;border-radius:4px;color:white;font-size:11px;cursor:pointer;white-space:nowrap;height:30px}
.btn-connect:hover{background:#60a5fa}
.btn-connect:disabled{opacity:.5;cursor:default}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.status-ok{background:#4ade80}.status-err{background:#f87171}.status-idle{background:#666}

.chat-area{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;min-height:300px;max-height:500px;overflow-y:auto;padding:12px}
.msg{margin-bottom:8px;padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.5}
.msg-user{background:#1c1c1c;margin-left:40px}
.msg-ai{background:#111}
.msg-ai pre{background:#0a0a0a;padding:6px;border-radius:4px;font-size:10px;overflow-x:auto;margin:4px 0}
.msg-ai code{font-family:monospace}
.thinking{color:#60a5fa;font-size:10px;font-style:italic;padding:4px 0}
.tool-card{background:#181818;border:1px solid #252525;border-radius:6px;padding:6px 8px;margin:4px 0;font-size:10px}
.tool-name{color:#0891b2;font-family:monospace}

.input-area{display:flex;gap:8px;margin-top:12px}
.input-area input{flex:1;padding:8px 12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:12px;outline:none}
.input-area input:focus{border-color:#3B82F6}
.input-area button{padding:8px 16px;background:#3B82F6;border:none;border-radius:8px;color:white;font-size:11px;cursor:pointer}
.input-area button:disabled{opacity:.5}
.hint{font-size:10px;color:#555;margin-top:8px;text-align:center}
.saved{font-size:9px;color:#4ade80;margin-left:6px}
</style>
</head>
<body>
<div id="app">
  <div class="config-bar">
    <div class="config-row">
      <div>
        <label>API Base URL</label>
        <input id="baseUrl" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1" />
      </div>
      <div>
        <label>Model</label>
        <input id="model" value="gpt-4o-mini" placeholder="gpt-4o" />
      </div>
      <div>
        <label>API Key <span id="saved-tag"></span></label>
        <input id="apiKey" type="password" placeholder="sk-..." />
      </div>
      <div>
        <button class="btn-connect" id="connectBtn" onclick="toggleConnect()">
          <span class="status-dot status-idle" id="statusDot"></span>连接
        </button>
      </div>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg msg-ai" style="color:#666;text-align:center">
      配置 API Key 和 Base URL 后点击「连接」，即可在此与 Agent 对话。<br>
      支持 OpenAI / DeepSeek / 任何兼容 API。
    </div>
  </div>

  <div class="input-area">
    <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()" disabled />
    <button id="sendBtn" onclick="sendMsg()" disabled>发送</button>
  </div>
  <div class="hint">API Key 仅存储在浏览器 localStorage 中，不会发送到任何第三方服务器</div>
</div>

<script>
let connected = false;
let messages = [];

// Load saved config
const saved = JSON.parse(localStorage.getItem('svton_playground') || '{}');
if (saved.baseUrl) document.getElementById('baseUrl').value = saved.baseUrl;
if (saved.model) document.getElementById('model').value = saved.model;
if (saved.apiKey) {
  document.getElementById('apiKey').value = saved.apiKey;
  document.getElementById('saved-tag').innerHTML = '<span class="saved">已保存</span>';
}

function toggleConnect() {
  if (connected) {
    connected = false;
    updateUI();
    return;
  }
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const model = document.getElementById('model').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('请输入 API Key'); return; }
  localStorage.setItem('svton_playground', JSON.stringify({ baseUrl, model, apiKey }));
  document.getElementById('saved-tag').innerHTML = '<span class="saved">已保存</span>';
  connected = true;
  messages = [];
  addMsg('ai', '✅ 已连接到 ' + baseUrl + ' · 模型: ' + model + '\n\n现在可以开始对话了！试试：\n- "帮我写一个快排算法"\n- "解释 React useEffect"\n- "TypeScript 和 JavaScript 的区别"');
  updateUI();
}

function updateUI() {
  const dot = document.getElementById('statusDot');
  const btn = document.getElementById('connectBtn');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  if (connected) {
    dot.className = 'status-dot status-ok';
    btn.innerHTML = '<span class="status-dot status-ok"></span>断开';
    input.disabled = false; sendBtn.disabled = false;
    input.focus();
  } else {
    dot.className = 'status-dot status-idle';
    btn.innerHTML = '<span class="status-dot status-idle"></span>连接';
    input.disabled = true; sendBtn.disabled = true;
  }
}

function addMsg(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg msg-' + (role === 'user' ? 'user' : 'ai');

  // Simple markdown rendering
  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code style="background:#1a1a1a;padding:1px 4px;border-radius:2px;font-size:11px">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  div.innerHTML = html;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMsg() {
  if (!connected) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  const model = document.getElementById('model').value;
  const baseUrl = document.getElementById('baseUrl').value;
  const apiKey = document.getElementById('apiKey').value;

  // Show typing indicator
  const area = document.getElementById('chatArea');
  const typing = document.createElement('div');
  typing.className = 'msg msg-ai';
  typing.id = 'typing';
  typing.innerHTML = '<span style="color:#60a5fa">● ● ●</span>';
  area.appendChild(typing);
  area.scrollTop = area.scrollHeight;

  try {
    const resp = await fetch(baseUrl + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        model,
        messages,
        stream: false,
        max_tokens: 2000,
      }),
    });

    document.getElementById('typing')?.remove();

    if (!resp.ok) {
      const err = await resp.text();
      addMsg('ai', '❌ API 错误 (' + resp.status + '): ' + err.slice(0, 200));
      return;
    }

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '(空回复)';
    addMsg('ai', reply);
    messages.push({ role: 'assistant', content: reply });
  } catch (e) {
    document.getElementById('typing')?.remove();
    addMsg('ai', '❌ 请求失败: ' + (e.message || e) + '\n\n检查 Base URL 和 API Key 是否正确。');
  }
}

// Report height to parent
function reportHeight(){parent.postMessage({type:'demo-height',height:document.body.scrollHeight+20},'*')}
setTimeout(reportHeight,100);setTimeout(reportHeight,500);
window.addEventListener('load',reportHeight);
new MutationObserver(()=>setTimeout(reportHeight,50)).observe(document.getElementById('chatArea'),{childList:true,subtree:true});
</script>
</body>
</html>
