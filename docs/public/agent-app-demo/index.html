<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svton Agent — 在线体验</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Menlo','Monaco','Consolas','Liberation Mono',monospace;
      background:#000; color:#ededed;
    }
    #gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    #gate h1 { font-size:1.5rem; font-weight:600; margin-bottom:.5rem; color:#fff; }
    #gate .desc { color:#888; font-size:.8rem; margin-bottom:2rem; text-align:center; max-width:400px; line-height:1.7; }
    .gate-form { width:100%; max-width:400px; }
    .gate-form label { display:block; font-size:.7rem; color:#555; margin-bottom:.375rem; text-transform:uppercase; letter-spacing:.05em; }
    .gate-form select, .gate-form input {
      width:100%; padding:.625rem .75rem; background:#111; border:1px solid #222;
      border-radius:8px; color:#ccc; font-size:.8rem; outline:none; margin-bottom:.875rem;
      font-family:inherit; transition:border-color .2s;
    }
    .gate-form select:focus, .gate-form input:focus { border-color:#0891b2; }
    .gate-form input[type=password] { font-family:'Menlo','Monaco',monospace; }
    .gate-btn {
      width:100%; padding:.7rem; background:#0891b2; color:#fff; border:none;
      border-radius:8px; font-size:.8rem; font-weight:500; cursor:pointer;
      font-family:inherit; transition:background .2s;
    }
    .gate-btn:hover { background:#0e7490; }
    .gate-note {
      margin-top:1.5rem; font-size:.7rem; color:#444; text-align:center;
      display:flex; align-items:center; gap:.4rem; justify-content:center;
    }
    .gate-models { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.875rem; }
    .gate-model-tag {
      padding:.2rem .55rem; background:#111; border:1px solid #222;
      border-radius:6px; font-size:.7rem; color:#666; cursor:pointer; transition:all .2s;
    }
    .gate-model-tag:hover { border-color:#0891b2; color:#0891b2; }
    .gate-model-tag.selected { border-color:#0891b2; color:#0891b2; background:rgba(8,145,178,.08); }
    .custom-model-row { display:none; margin-bottom:.875rem; }
    .custom-toggle-row { display:flex; align-items:center; gap:.4rem; margin-bottom:.6rem; font-size:.7rem; color:#666; cursor:pointer; }
    .custom-toggle-row input { width:auto; margin:0; }
    #app:empty { display:none; }
    #gate.hidden { display:none; }
    .loading { display:flex; align-items:center; justify-content:center; height:100vh; color:#444; font-size:.8rem; }
  </style>
</head>
<body>

<div id="gate">
  <h1>Svton Agent</h1>
  <p class="desc">输入你的 API Key 即可体验完整的 AI Agent 能力。Key 仅存储在浏览器本地，不会发送到任何服务器。</p>
  <div class="gate-form">
    <label>选择 Provider</label>
    <select id="providerType">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic (Claude)</option>
    </select>
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
    <label>Base URL（可选，用于代理或自部署）</label>
    <input type="text" id="baseUrl" placeholder="https://api.openai.com" />

    <label class="custom-toggle-row">
      <input type="checkbox" id="customModelToggle" />
      使用自定义模型（手动输入模型 ID）
    </label>

    <div id="customModelRow" class="custom-model-row">
      <label>模型 ID</label>
      <input type="text" id="customModelId" placeholder="例如: gpt-4-turbo, deepseek-chat, qwen-max" />
      <label>显示名称（可选）</label>
      <input type="text" id="customModelName" placeholder="GPT-4 Turbo" />
    </div>

    <label id="presetLabel">或选择预设模型</label>
    <div class="gate-models" id="modelTags"></div>

    <button class="gate-btn" id="startBtn">启动 Agent →</button>
    <div class="gate-note">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      API Key 仅存储在本地浏览器
    </div>
  </div>
</div>

<div id="app"></div>

<script src="./bundle.js"></script>

</body>
</html>
