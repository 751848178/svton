<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svton Agent — 在线体验</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a0a0a; color:#e5e5e5; }
    #gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    #gate h1 { font-size:1.75rem; font-weight:600; margin-bottom:.5rem; color:#fff; }
    #gate .desc { color:#888; font-size:.875rem; margin-bottom:2rem; text-align:center; max-width:420px; line-height:1.6; }
    .gate-form { width:100%; max-width:420px; }
    .gate-form label { display:block; font-size:.75rem; color:#666; margin-bottom:.375rem; text-transform:uppercase; letter-spacing:.05em; }
    .gate-form select, .gate-form input { width:100%; padding:.625rem .75rem; background:#161616; border:1px solid #2a2a2a; border-radius:8px; color:#e5e5e5; font-size:.875rem; outline:none; margin-bottom:1rem; }
    .gate-form select:focus, .gate-form input:focus { border-color:#3B82F6; }
    .gate-form input[type=password] { font-family:monospace; }
    .gate-btn { width:100%; padding:.75rem; background:#3B82F6; color:#fff; border:none; border-radius:8px; font-size:.875rem; font-weight:500; cursor:pointer; }
    .gate-btn:hover { background:#2563EB; }
    .gate-note { margin-top:1.5rem; font-size:.75rem; color:#555; text-align:center; display:flex; align-items:center; gap:.5rem; justify-content:center; }
    .gate-models { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem; }
    .gate-model-tag { padding:.25rem .625rem; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; font-size:.75rem; color:#888; cursor:pointer; transition:all .2s; }
    .gate-model-tag:hover { border-color:#3B82F6; color:#3B82F6; }
    .gate-model-tag.selected { border-color:#3B82F6; color:#3B82F6; background:rgba(59,130,246,.1); }
    .custom-model-row { display:none; margin-bottom:1rem; }
    .custom-toggle-row { display:flex; align-items:center; gap:.5rem; margin-bottom:.75rem; font-size:.75rem; color:#888; cursor:pointer; }
    .custom-toggle-row input { width:auto; margin:0; }
    #app:empty { display:none; }
    #gate.hidden { display:none; }
    .loading { display:flex; align-items:center; justify-content:center; height:100vh; color:#555; font-size:.875rem; }
  </style>
</head>
<body>

<div id="gate">
  <h1>Svton Agent</h1>
  <p class="desc">输入你的 API Key 即可体验完整的 AI Agent 能力。Key 仅存储在你的浏览器本地，不会发送到任何服务器。</p>
  <div class="gate-form">
    <label>选择 Provider</label>
    <select id="providerType">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic (Claude)</option>
    </select>
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
    <label>Base URL（可选，用于代理或自部署）</label>
    <input type="text" id="baseUrl" placeholder="https://api.openai.com" />

    <label class="custom-toggle-row">
      <input type="checkbox" id="customModelToggle" />
      使用自定义模型（手动输入模型 ID）
    </label>

    <div id="customModelRow" class="custom-model-row">
      <label>模型 ID</label>
      <input type="text" id="customModelId" placeholder="例如: gpt-4-turbo, deepseek-chat, qwen-max" />
      <label>显示名称（可选）</label>
      <input type="text" id="customModelName" placeholder="GPT-4 Turbo" />
    </div>

    <label id="presetLabel">或选择预设模型</label>
    <div class="gate-models" id="modelTags"></div>

    <button class="gate-btn" id="startBtn">启动 Agent →</button>
    <div class="gate-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      API Key 仅存储在本地浏览器
    </div>
  </div>
</div>

<div id="app"></div>

<script src="./bundle.js"></script>

</body>
</html>
