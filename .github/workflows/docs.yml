name: Deploy Docs + Demo

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'apps/agent-web/**'
      - 'packages/agent-ui/**'
      - 'ai/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install all dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build agent-web and all dependencies
        run: pnpm --filter @svton/agent-web... build

      - name: Copy agent-web to docs public (served as static files)
        run: |
          mkdir -p docs/public/demo
          cp -r apps/agent-web/out/* docs/public/demo/

      - name: Build docs (VitePress copies public/ to dist/)
        run: pnpm --filter docs build

      - name: Verify demo files exist
        run: ls docs/.vitepress/dist/demo/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
