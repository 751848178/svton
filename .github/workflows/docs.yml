name: Deploy Docs + Demo

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'apps/agent-web/**'
      - 'packages/agent-ui/**'
      - 'ai/agent-core/**'
      - 'ai/agent-client/**'
      - 'ai/agent-platform/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install all dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build core packages
        run: |
          pnpm --filter @svton/agent-core build
          pnpm --filter @svton/agent-client build
          pnpm --filter @svton/agent-ui build

      - name: Build agent-web (static export)
        run: pnpm --filter agent-web build

      - name: Build docs
        run: pnpm --filter docs build

      - name: Merge agent-web into docs dist
        run: |
          mkdir -p docs/.vitepress/dist/demo
          cp -r apps/agent-web/out/* docs/.vitepress/dist/demo/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
